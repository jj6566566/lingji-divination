server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/divination?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

# 自定义配置
app:
  ai-service:
    base-url: http://localhost:8001
    timeout: 120000

  jwt:
    secret: ${JWT_SECRET:lingji-dev-secret-key-2026-32bytes!!}
    expiration: 86400000

  quota:
    free-per-day: 3

logging:
  level:
    com.divination: DEBUG
